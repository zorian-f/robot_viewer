name: Deploy to Firebase Hosting

# Builds the Vite app and deploys it to Firebase Hosting on every push:
#   - main       -> production "live" channel  (https://orrerium.web.app)
#   - develop    -> stable preview channel      (https://orrerium--develop-<hash>.web.app)
#   - feat/**    -> per-branch preview channel   (https://orrerium--feat-<name>-<hash>.web.app)
# Manual runs via the "Run workflow" button are also supported.
on:
  push:
    branches: [main, develop, 'feat/**']
  workflow_dispatch:

permissions:
  contents: read

# Avoid overlapping deploys racing each other; cancel an in-progress run when a
# newer commit lands on the same ref.
concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # pnpm must be set up before setup-node so that `cache: pnpm` can resolve.
      # Version is taken from package.json "packageManager" (pnpm@9.0.0); do not
      # also set it here or action-setup errors on the duplicate.
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Pinned to 24.16.0: Node 24.17.0's bundled undici regressed keep-alive connections to
          # googleapis, causing "Premature close" on the Firebase deploy's OAuth token fetch and
          # release calls (red CI despite a working deploy). 24.16.0 is the last good runner Node.
          # Revisit (back to `24`) once a Node 24.x ships with the undici fix.
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # main -> production ("live"); any other branch (e.g. develop) -> a stable
      # preview channel named after the branch. Preview channels keep the same
      # URL across redeploys; expiry is reset to 30d on each push.
      # Pinned at v0 (latest v0.10.0): still ships on Node 20, so it logs the Node-20
      # deprecation warning. There is no Node-24 release upstream yet — bump when one lands.
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORRERIUM }}
          projectId: orrerium
          channelId: ${{ github.ref_name == 'main' && 'live' || github.ref_name }}
          expires: 30d
