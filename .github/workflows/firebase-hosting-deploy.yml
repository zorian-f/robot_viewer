name: Deploy to Firebase Hosting

# Builds the Vite app and deploys it to the Firebase Hosting "live" channel
# (https://orrerium.web.app) on every push to main. Manual runs via the
# "Run workflow" button are also supported.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Avoid overlapping deploys racing each other; cancel an in-progress run when a
# newer commit lands on the same ref.
concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be set up before setup-node so that `cache: pnpm` can resolve.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORRERIUM }}
          projectId: orrerium
          channelId: live
